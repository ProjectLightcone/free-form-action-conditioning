friction: 0.985
restitution: 0.86
scene_val_fraction: 0.2
heldout_template_fraction: 0.2
batch_size: 32
epochs: 3
learning_rate: 0.001
optimizer: adamw
weight_decay: 0.01
lr_schedule: cosine
min_learning_rate: 0.0001
lr_decay_start_epoch: 0
