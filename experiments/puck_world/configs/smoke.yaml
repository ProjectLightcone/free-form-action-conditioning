early_stopping_monitor: auto
early_stopping_min_delta: 0.001
early_stopping_patience: 12
early_stopping_min_epochs: 20
latent_dim: 64
max_text_len: 192
heatmap_size: 32
normalize_latents: false
sigreg_weight: 0.1
sigreg_num_slices: 1024
sigreg_num_points: 17
sigreg_integration_bound: 5.0
sigreg_on_predictions: false
target_sigreg_weight: 0.02
target_sigreg_warmup_epochs: 2
target_sigreg_ramp_epochs: 2
condition_families:
  natural_language: 0.4
  json: 0.25
  yaml: 0.2
  key_value: 0.15
