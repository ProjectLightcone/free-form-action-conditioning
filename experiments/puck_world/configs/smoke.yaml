dataset_version: puck-smoke
seed: 7
output_dir: data/processed/puck-smoke
run_dir: reports/runs
checkpoint_dir: checkpoints
image_size: 64
horizon: 40
num_scenes: 32
events_per_scene: 4
renderings_per_event: 3
min_pucks: 1
